
{% extends 'base.html' %}
{% block title %}Supprimer Patient | Hospital{% endblock %}
{% block content %}
<div class="glass-card p-4 p-md-5">
	<div class="section-head">
		<h2>Supprimer patient</h2>
	</div>

	<div class="alert" style="background:#fee9e9; color:#6d2424; border:1px solid #f6c9c9;">
		Voulez-vous vraiment supprimer le patient <strong>{{ patient.first_name }} {{ patient.last_name }}</strong> ?
	</div>

	<form method="POST" class="d-flex gap-2">
		{% csrf_token %}
		<button type="submit" class="btn btn-danger">Supprimer</button>
		<a href="{% url 'patient_list' %}" class="btn btn-outline-secondary">Annuler</a>
	</form>
</div>
{% endblock %}
