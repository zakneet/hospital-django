<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hospital Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f9f8;
      --ink: #17322f;
      --muted: #4f6763;
      --surface: #ffffff;
      --surface-2: #ecf4f2;
      --primary: #007f6b;
      --primary-strong: #006555;
      --accent: #f2a65a;
      --danger: #c53f3f;
      --ring: rgba(0, 127, 107, 0.2);
      --shadow: 0 16px 38px rgba(23, 50, 47, 0.12);
    }

    body {
      background: radial-gradient(circle at 15% 5%, #d9f1ea 0%, transparent 35%),
            radial-gradient(circle at 95% 90%, #ffe2bf 0%, transparent 28%),
            linear-gradient(140deg, #f9fcfb 0%, #edf5f3 100%);
      color: var(--ink);
      font-family: "Outfit", sans-serif;
      min-height: 100vh;
    }

    .app-nav {
      backdrop-filter: blur(7px);
      background: rgba(16, 52, 48, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .brand-mark {
      display: inline-flex;
      width: 30px;
      height: 30px;
      margin-right: 8px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), #4bc7af);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .main-shell {
      max-width: 1080px;
      margin: 2rem auto;
      padding: 0 1rem;
      animation: rise-in 0.45s ease-out;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 1rem;
    }

    .section-head h1,
    .section-head h2,
    .section-head h3 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    .btn-primary:hover,
    .btn-primary:focus {
      background-color: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .btn-accent {
      background-color: var(--accent);
      border-color: var(--accent);
      color: #3d250f;
      font-weight: 600;
    }

    .btn-accent:hover,
    .btn-accent:focus {
      background-color: #dc9049;
      border-color: #dc9049;
      color: #2f1e0c;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid #dce7e4;
    }

    .table {
      margin: 0;
    }

    .table thead th {
      background: var(--surface-2);
      color: var(--ink);
      border-bottom: none;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.02em;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.25rem var(--ring);
    }

    .msg-stack .alert {
      border: none;
      border-radius: 12px;
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-nav">
  <div class="container-fluid">
    <a href="{% url 'dashboard' %}" class="navbar-brand brand">
      <span class="brand-mark">H</span>Hospital
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      {% if request.user.is_authenticated %}
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2 mt-3 mt-lg-0">
        <li class="nav-item"><a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="{% url 'patient_list' %}" class="nav-link">Patients</a></li>
        <li class="nav-item"><a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a></li>
      </ul>
      {% else %}
      <div class="ms-auto mt-3 mt-lg-0">
        <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light">Login</a>
      </div>
      {% endif %}
    </div>
  </div>
</nav>

<main class="main-shell">
  {% if messages %}
  <div class="msg-stack mb-3">
    {% for message in messages %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

    {% block content %}
    {% endblock %}
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
